# Deploy-time compose file used on the EC2 host. Jenkins runs
# `docker compose -f docker-compose.prod.yml pull && up -d` over SSH.
# Images come from Docker Hub instead of being built locally.
#
# Note: for a real production system these Postgres credentials would come
# from a secrets manager (AWS SSM/Secrets Manager, Vault, etc.), not a
# compose file. They're inlined here to keep the workshop's EC2 setup to a
# single `git pull`, with no secret files to sync separately.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    image: lalbudha47/tasktracker-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
      PORT: 8080
    depends_on:
      - db

  frontend:
    image: lalbudha47/tasktracker-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
