server {
    listen 80;

    # Reverse-proxy API calls to the backend container. This is what lets
    # the browser call "/api/tasks" without knowing the backend's address —
    # nginx is the only thing that needs to know it's "backend:8080".
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri /index.html;
    }
}
